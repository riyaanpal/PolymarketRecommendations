name: Daily Polymarket refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "17 11 * * *"

permissions:
  contents: write

concurrency:
  group: polymarket-daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate scanner
        run: |
          npm test
          npm run check

      - name: Refresh recommendations
        run: npm run refresh

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- data/recommendations.json; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git config user.name "signal-50-bot"
          git config user.email "signal-50-bot@users.noreply.github.com"
          git add data/recommendations.json
          git commit -m "chore: refresh daily Polymarket signals"
          git push
