name: 30-Minute Polymarket refresh

on:
  workflow_dispatch:
  schedule:
    # Runs at :07 and :37 instead of :00 and :30 to avoid GitHub's busiest times.
    - cron: "7,37 * * * *"

permissions:
  contents: write

concurrency:
  group: polymarket-30-minute-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: polymarket-signal-50-fixed

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate scanner
        run: |
          npm test
          npm run check

      - name: Check for recommendation updates
        run: npm run refresh

      - name: Force-update lastCheckedAt after every successful scan
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const path = "data/recommendations.json";
          const data = JSON.parse(fs.readFileSync(path, "utf8"));
          const now = new Date().toISOString();

          data.lastCheckedAt = now;
          data.lastSuccessfulWorkflowAt = now;
          data.refreshCadence = "every 30 minutes";
          data.timestampOnlyUpdate = true;

          fs.writeFileSync(path, JSON.stringify(data, null, 2) + "\n");
          NODE

      - name: Commit updated timestamp or recommendations
        run: |
          if git diff --quiet -- data/recommendations.json; then
            echo "No recommendation file changes to commit."
            exit 0
          fi
          git config user.name "signal-50-bot"
          git config user.email "signal-50-bot@users.noreply.github.com"
          git add data/recommendations.json
          git commit -m "chore: check Polymarket signals"
          git push
